name: release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get bump version
        id: bump_label
        uses: actions/github-script@v7
        with:
          script: |
            let labels = [];
            if (context.payload.pull_request) {
              labels = context.payload.pull_request.labels.map(l => l.name);
            } else {
              const match = (context.payload.head_commit?.message || "").match(/\(#(\d+)\)/);
              if (match) {
                const pr = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: Number(match[1]),
                });
                labels = pr.data.labels.map(l => l.name);
              }
            }
            const bumpLabels = labels
              .filter(l => l.startsWith("bump:"))
              .map(l => l.slice("bump:".length));
            const order = ["major", "minor", "patch", "ignore"];
            const bump = order.find(o => bumpLabels.includes(o));
            core.setOutput("label_value", bump || "patch");
            core.setOutput("had_label", Boolean(bump));

      - name: Require bump label on PRs
        if: ${{ github.event_name == 'pull_request' && steps.bump_label.outputs.had_label != 'true' }}
        run: |
          echo "::error::No bump:major, bump:minor, bump:patch, or bump:ignore label found on this PR. Add one before merging."
          exit 1

      - name: Compute next tag
        id: tag_version
        run: |
          git fetch --tags
          latest=$(git tag --sort=-v:refname | head -n1)
          latest=${latest:-v0.0.0}
          IFS='.' read -r major minor patch <<< "${latest#v}"
          case "${{ steps.bump_label.outputs.label_value }}" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac
          new_tag="v${major}.${minor}.${patch}"
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            git tag "$new_tag"
            git push origin "$new_tag"
          fi

      - name: create release
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          release_date=$(date -u +%Y-%m-%d)
          gh release create "${{ steps.tag_version.outputs.new_tag }}" \
            --title "${{ steps.tag_version.outputs.new_tag }} — ${release_date}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
