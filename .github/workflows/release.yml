name: release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get bump version
        id: bump_label
        uses: actions/github-script@v7
        with:
          script: |
            let labels = [];
            if (context.payload.pull_request) {
              labels = context.payload.pull_request.labels.map(l => l.name);
            } else {
              const match = (context.payload.head_commit?.message || "").match(/\(#(\d+)\)/);
              if (match) {
                const pr = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: Number(match[1]),
                });
                labels = pr.data.labels.map(l => l.name);
              }
            }
            const bumpLabels = labels
              .filter(l => l.startsWith("bump:"))
              .map(l => l.slice("bump:".length));
            const order = ["major", "minor", "patch", "ignore"];
            const bump = order.find(o => bumpLabels.includes(o)) || "patch";
            core.setOutput("label_value", bump);


      - name: create tag to release
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ steps.bump_label.outputs.label_value }}
          dry_run: ${{ github.event_name == 'pull_request' }}
          tag_prefix: v


      - name: create release
        uses: ncipollo/release-action@v1
        if: ${{ github.event_name != 'pull_request' }}
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
