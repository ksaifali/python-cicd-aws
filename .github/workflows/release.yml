name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute next tag
        id: tag_version
        run: |
          git fetch --tags
          today=$(date -u +%Y.%m.%d)
          count=$(git tag -l "v${today}*" | wc -l | tr -d ' ')
          if [ "$count" -eq 0 ]; then
            new_tag="v${today}"
          else
            new_tag="v${today}-$((count+1))"
          fi
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"
          git tag "$new_tag"
          git push origin "$new_tag"

      - name: create release
        run: gh release create "${{ steps.tag_version.outputs.new_tag }}" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
